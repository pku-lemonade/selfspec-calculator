reuse_policy: reread
library: song_analog_sramcim_2025_v1
library_file: library_hyflexpim_song_2025.json

soc:
  schedule: layer-pipelined
  attention_cim_units: 128
  draft_activation_bits: 8
  verify_activation_bits: 16

memory:
  kv_cache:
    max_context_tokens: 8192
    hbm:
      value_bytes_per_elem: 1
      scale_bytes: 2
      scales_per_token_per_head: 2

analog:
  xbar_size: 128
  num_columns_per_adc: 128
  dac_bits: 8
  adc:
    num_columns_per_adc:
      draft: 16
      residual: 32
    draft_bits: 5
    residual_bits: 10
  delta_readout:
    draft:
      enabled: true
      dac_bits: 8
    verify:
      enabled: true
      dac_bits: 8
